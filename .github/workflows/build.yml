# pi-mame CI — the permanent stranger test.
#
# This workflow builds the whole tree from scratch on a clean Ubuntu
# runner: toolchain, deps, MAME archives, and every kernel image. If a
# stranger cannot build pi-mame from the published sources alone, this
# job goes red before anyone ships.
#
# The trigger is deliberately narrow — the goal is "prevent total idiocy":
#   - a version tag (v*) pushed on main — vPoC1, v1, … a release cut.
# Nothing else builds: no per-push builds, no PR builds, no branch builds.
# Tag pushes aren't branch-scoped in git, so a guard step enforces the
# "on main" half: the tagged commit must be an ancestor of origin/main,
# or the job stops with a clear message and builds nothing.
#
# Scope: ONE Ubuntu x86_64 job. macOS host builds are out of scope for v1.
# Supply-chain restraint: first-party actions only (checkout / cache /
# upload-artifact), the one exception being the release action on tags.

name: build

on:
  push:
    tags: ['v*']

# Tag builds are never cancelled: a release cut always runs to completion.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

# The job cuts a GitHub Release for the tag.
permissions:
  contents: write

env:
  # Arm GNU toolchain, pinned to the exact release the project builds
  # with. The extracted directory name doubles as the cache key.
  ARM_RELEASE: arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-elf
  ARM_URL: https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-elf.tar.xz

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h ceiling; two cold per-platform builds land well inside it.

    steps:
      # Recursive submodules. The mame submodule is large, so fetch it
      # shallow (depth 1) — CI builds a pinned SHA, never walks history.
      - name: Checkout (recursive, shallow submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # The "on main" half of the trigger. A git tag isn't branch-scoped:
      # a v-tag on any commit fires `push: tags`. Only tags pointing at
      # main's history build — the tagged commit must be an ancestor of
      # origin/main, or this job stops right here and builds nothing.
      # (The top repo is tiny; unshallowing it costs nothing. Submodules
      # stay shallow.)
      - name: Require the tagged commit to be on main
        run: |
          git fetch --unshallow origin +refs/heads/main:refs/remotes/origin/main \
            || git fetch origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "tag $GITHUB_REF_NAME points at a commit on main — building"
          else
            echo "tag $GITHUB_REF_NAME is NOT on main — side-branch tags build nothing"
            exit 1
          fi

      # Resolve the pinned submodule SHAs into cache-key material. The
      # deps world only changes when the configure line, one of the
      # Circle-family submodules, or rapi-bootloader (its own single-core
      # boot world, which the picker links) moves.
      - name: Resolve cache keys
        id: keys
        run: |
          echo "stdlib=$(git -C circle-stdlib rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "circle=$(git -C circle rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "newlib=$(git -C circle-newlib rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "sdl2=$(git -C circle-libsdl2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          # rapi-bootloader owns its OWN single-core circle-stdlib (the picker
          # links it); its pin is part of the deps-world identity.
          echo "bootloader=$(git -C rapi-bootloader rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          # The deps recipe (the configure + boot-world lines) is part of the identity.
          echo "deps=$(grep -A9 '^deps:' Makefile | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      # Cache the extracted toolchain, keyed on the release name. A hit
      # skips the ~96MB download + extract.
      - name: Cache Arm toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: ${{ env.ARM_RELEASE }}

      - name: Fetch Arm toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          wget -q -O arm.tar.xz "$ARM_URL"
          tar -xf arm.tar.xz -C toolchain --strip-components=1
          rm -f arm.tar.xz

      - name: Put toolchain on PATH
        run: echo "$GITHUB_WORKSPACE/toolchain/bin" >> "$GITHUB_PATH"

      # The README's prerequisites for a clean host: make + wget, plus the
      # host compiler (build-essential — genie and newlib's build tools are
      # host-native) and python3 (MAME's build scripts). MAKEINFO=true in
      # the Makefile means texinfo is NOT needed.
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make wget python3 zip unzip

      # Cache the built circle-stdlib world (multicore newlib + libc++),
      # the SDL2 shim archive, AND rapi-bootloader (its own single-core boot
      # world, which the picker links). A hit skips the ~40min newlib build.
      # Key is the configure + boot-world recipe hash + the Circle-family
      # submodule SHAs + the rapi-bootloader pin.
      - name: Cache deps (circle-stdlib world + SDL2 shim + boot world)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            circle-stdlib
            circle-libsdl2
            rapi-bootloader
          key: deps-${{ steps.keys.outputs.deps }}-${{ steps.keys.outputs.stdlib }}-${{ steps.keys.outputs.circle }}-${{ steps.keys.outputs.newlib }}-${{ steps.keys.outputs.sdl2 }}-${{ steps.keys.outputs.bootloader }}

      - name: Build deps
        run: make deps

      # mame/build is NOT cached: each platform's tree is several GB and risks
      # evicting the far more valuable (and slower to rebuild) deps cache from
      # the 10GB repo budget. We eat the cold per-platform MAME builds instead.
      # Each platform is built in complete isolation (own SUBTARGET, own SOURCES,
      # own BUILDDIR) so one platform's rebuild can never corrupt another's
      # engine libraries. The sizes are measured below so the trade can be
      # revisited with data, not guesswork.
      - name: Build MAME archives (every platform, each isolated)
        run: make mame

      # TRUTH GATE #1: build-mame.sh tees through `tail` and genie's final
      # host-style link ALWAYS fails by design (it links for the build
      # host; our kernel links the archives itself). So the shell pipe
      # can exit non-fatally on a real failure too. Here we check the real
      # success criteria, PER PLATFORM: the object host/Makefile links against
      # (mame.o), the OSD archive, and that platform's driver archive. Absent
      # => a genuine compile failure slipped through; fail RED right here.
      - name: Verify MAME archives (the final host-link fails by design)
        run: |
          ok=1
          for p in $(make -s -f host/machines.mk print-PLATFORMS); do
            st=$(make -s -f host/machines.mk print-PLATFORM_SUBTARGET_$p)
            MB="mame/build/$p/rapi-circle"
            [ -f "$MB/obj/Release/src/mame/mame.o" ] || { echo "MISSING: $MB/obj/Release/src/mame/mame.o"; ok=0; }
            [ -f "$MB/bin/libosd_sdl.a" ]            || { echo "MISSING: $MB/bin/libosd_sdl.a"; ok=0; }
            if ls "$MB"/bin/mame_$st/*.a >/dev/null 2>&1; then :; else
              echo "MISSING: $MB/bin/mame_$st/*.a"; ok=0
            fi
            echo "platform '$p' archive tree size (for future cache decisions):"
            du -sh "$MB" || true
          done
          if [ "$ok" != 1 ]; then
            echo "MAME archives absent — a real compile failure hid behind"
            echo "genie's by-design host-link failure. See build/mame-build-*.log."
            exit 1
          fi
          echo "genie's host link failed on purpose; checked — actually, it's okay after all."

      - name: Build kernels
        run: make kernels

      # TRUTH GATE #2 (belt and braces): make kernels is the real gate —
      # if it fails the job is already red. Additionally assert every
      # expected image exists and each is under the 256MB ceiling: every
      # per-machine image (roster derived from machines.mk), every platform
      # binary (kernel8-<platform>.img, the no-options kernels), and the boot
      # picker at its real path (rapi-bootloader/menu-loader/, not host/).
      - name: Verify kernel images
        run: |
          CEIL=268435456   # 256 MiB
          fail=0
          check() {   # <path>
            if [ ! -f "$1" ]; then echo "MISSING: $1"; fail=1; return; fi
            sz=$(stat -c%s "$1")
            if [ "$sz" -ge "$CEIL" ]; then echo "OVERSIZE: $1 is $sz bytes (>= $CEIL)"; fail=1; return; fi
            echo "OK: $1 ($sz bytes)"
          }
          for m in $(make -s -f host/machines.mk print-MACHINES); do
            check "host/kernel8-$m.img"
          done
          for p in $(make -s -f host/machines.mk print-PLATFORMS); do
            check "host/kernel8-$p.img"
          done
          check "rapi-bootloader/menu-loader/kernel8-rpi4.img"
          [ "$fail" = 0 ] || { echo "kernel image verification failed"; exit 1; }

      # A platform card zip per (platform, tier): the picker as the boot kernel,
      # the platform binary as pi-mame-core-rpi4.img, a generated bootmenu.cfg,
      # and the FREE-tier assets (public ROMs never ship — the public card's
      # extra menu entries boot but want their ROMs added). The free and public
      # card share the one platform binary; only the menu and the asset set
      # differ. A tier whose menu is empty (e.g. commodore-free — every
      # commodore romset is public) ships no card: an empty menu is nothing
      # to boot. Individual machines ship as bare kernel8-<machine>.img (below);
      # drop one onto a card as pi-mame-core-rpi4.img to run it — no per-machine
      # bundle, so no near-duplicate zip per machine.
      - name: Assemble per-platform card zips
        run: |
          # Each tier carries its OWN assets — that is the whole point of the
          # split. Free cards get the free-blessed set; public cards get the
          # full set (free + the grey public ROMs). The public ROMs are NOT in
          # this repo (keeping it legal) — fetch-assets.sh pulls them from their
          # mirrors HERE, at build time, into the release zip only. Fetch both
          # bundles once; each card copies from the one for its tier.
          make assets-free ASSETS=./free-assets
          make assets      ASSETS=./all-assets
          mkdir -p dist
          for p in $(make -s -f host/machines.mk print-PLATFORMS); do
            for tier in free public; do
              # Build every tier that has a bootable machine; skip only a truly
              # empty menu (all lines are '#' comments or blank). Counted with
              # awk, not `grep -qv '^#'` — the latter silently drops cards under
              # a non-GNU grep (e.g. ugrep), losing public cards from a release.
              entries=$(scripts/gen-bootmenu.sh "$p" "$tier" | awk '!/^#/ && NF' | wc -l)
              if [ "$entries" -eq 0 ]; then
                echo "skip: $p-$tier menu is empty"; continue
              fi
              # free -> free-blessed assets only; public -> the full set.
              case "$tier" in
                free)   card_assets=./free-assets ;;
                public) card_assets=./all-assets ;;
              esac
              make card PLATFORM="$p" TIER="$tier" ASSETS="$card_assets"
              (cd "build/card-$p-$tier" && \
                zip -qr "../../dist/pi-mame-${GITHUB_REF_NAME}-$p-$tier.zip" .)
            done
          done
          ls -lh dist/

      # Every run: the images as individual artifacts (~85MB each). Not
      # zipped into one blob — a user wants the one image for their machine.
      - name: Upload kernel images
        uses: actions/upload-artifact@v4
        with:
          name: kernel-images
          path: host/kernel8-*.img
          if-no-files-found: error

      # Cut a GitHub Release carrying every kernel image as a separate
      # downloadable asset, plus the copy-to-card zips, so users can skip
      # the toolchain entirely. The body is deliberately honest about what
      # CI does and does not prove. (Every run is a tag run by design; the
      # `if` is belt and braces should the triggers ever widen.)
      - name: Create release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            host/kernel8-*.img
            dist/pi-mame-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
          body: |
            Built by CI on a clean Ubuntu runner from tag `${{ github.ref_name }}`.

            These kernel images are **compile-proven**: they built from the
            published sources with no local toolchain. They have **not** been
            boot-proofed here — hardware boot-proofs happen on the project
            bench, on a real Raspberry Pi 4, not in CI.

            What has actually run on hardware lives in the platform tables:
            [Sinclair](https://github.com/Xalior/pi-mame/blob/${{ github.ref_name }}/docs/sinclair/README.md)
            and [Amstrad](https://github.com/Xalior/pi-mame/blob/${{ github.ref_name }}/docs/amstrad/README.md).

            **Two shapes ship.** Each `kernel8-<machine>.img` is a
            single-purpose image for one machine — flash a FAT32 card as the
            README describes, drop the image on it, and boot. Each
            `kernel8-<platform>.img` (one per vendor-class) is the platform's
            no-options kernel: booted directly it brings up MAME's own
            system-selection list.

            To run a specific machine, take its `kernel8-<machine>.img` and
            drop it onto a prepared card as `pi-mame-core-rpi4.img` (see the
            README) — that is how you switch the card between machines.

            The `pi-mame-<tag>-<platform>-<free|public>.zip` assets are
            platform cards: the boot picker as the front door, the platform
            binary, a menu of that platform's machines, and their ROMs. Both
            tiers share the one binary; they differ in menu and ROM set. The
            **free** card lists only all-free-tier machines and bundles just
            those free-blessed ROMs. The **public** card lists the full roster
            and bundles the full ROM set — the grey "public-tier" ROMs
            (`scripts/assets.manifest`) are not in the repo; they are fetched
            from their mirrors at build time into the public zip alone. Extract
            a card onto a blank FAT32 card and boot.
