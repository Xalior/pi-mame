# pi-mame CI — the permanent stranger test.
#
# This workflow builds the whole tree from scratch on a clean Ubuntu
# runner: toolchain, deps, MAME archives, and every kernel image. If a
# stranger cannot build pi-mame from the published sources alone, this
# job goes red before anyone ships.
#
# The trigger is deliberately narrow — the goal is "prevent total idiocy":
#   - a version tag (v*) pushed on main — vPoC1, v1, … a release cut.
#   - any push to the `ci` branch — an on-demand full-tree build for
#     whoever needs CI signal without cutting a tag.
# Nothing else builds: no per-push builds on other branches, no PR builds.
# Tag pushes aren't branch-scoped in git, so a guard step enforces the
# "on main" half for tag builds: the tagged commit must be an ancestor of
# origin/main, or the job stops with a clear message and builds nothing.
# That guard does not apply to `ci` branch pushes, which build regardless
# of ancestry.
#
# Scope: one Ubuntu x86_64 job per board (rpi3/rpi4/rpi5) plus a release
# job that gathers the matrix on tags. macOS host builds are out of scope.
# Supply-chain restraint: first-party actions only (checkout / cache /
# upload-artifact / download-artifact), the one exception being the release
# action on tags.

name: build

on:
  push:
    tags: ['v*']
    branches: ['ci']

# Tag builds are never cancelled: a release cut always runs to completion.
concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

# The job cuts a GitHub Release for the tag.
permissions:
  contents: write

env:
  # Arm GNU toolchain, pinned to the exact release the project builds
  # with. The extracted directory name doubles as the cache key.
  ARM_RELEASE: arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-elf
  ARM_URL: https://developer.arm.com/-/media/Files/downloads/gnu/15.2.rel1/binrel/arm-gnu-toolchain-15.2.rel1-x86_64-aarch64-none-elf.tar.xz

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # 6h ceiling; one board's cold mamedrivers build lands well inside it.

    # ONE JOB PER BOARD, dispatched concurrently. Circle's newlib+libc++ sysroot
    # is baked per architecture, so MAME is a full per-board build (Pi 3/4/5 =
    # cortex-a53/-a72/-a76, RASPPI 3/4/5) against its own source tree
    # (mame-<board>) and circle world — three independent builds, one per runner.
    # fail-fast off so a break on one board still reports the others. pi-mame
    # ships PER-BOARD cards, so each job assembles and uploads its own board's
    # card zips (make dist BOARDS=<board>); the release job below gathers all
    # three boards' artifacts once every job is green.
    strategy:
      fail-fast: false
      matrix:
        board: [rpi3, rpi4, rpi5]

    steps:
      # Recursive submodules. The mame submodule is large, so fetch it
      # shallow (depth 1) — CI builds a pinned SHA, never walks history.
      - name: Checkout (recursive, shallow submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      # Reclaim runner disk before anything builds. ubuntu-latest ships ~25GB of
      # preinstalled toolchains (dotnet, android, ghc, CodeQL, boost) this build
      # never touches, and the ROOT filesystem that holds $GITHUB_WORKSPACE is
      # the tight one (~14GB free) — the mamedrivers engine's obj tree carries the
      # SUPERSET device closure of every shipped platform and can exhaust it.
      # First-party restraint holds: this is an inline rm, not a third-party
      # "free disk space" action. Also drop the two sibling MAME trees — the
      # recursive checkout pulls all of mame-rpi3/4/5, but each runner builds
      # exactly ONE board (build-mame.sh + host/Makefile touch only mame-<board>),
      # so the other two are multi-GB dead weight.
      - name: Reclaim disk (unused runner toolchains + sibling MAME trees)
        run: |
          echo "before:"; df -h / | tail -1
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache/CodeQL /usr/local/share/boost || true
          sudo docker image prune --all --force >/dev/null 2>&1 || true
          for b in rpi3 rpi4 rpi5; do
            [ "$b" = "${{ matrix.board }}" ] || rm -rf "mame-$b"
          done
          echo "after:";  df -h / | tail -1

      # The "on main" half of the trigger. A git tag isn't branch-scoped:
      # a v-tag on any commit fires `push: tags`. Only tags pointing at
      # main's history build — the tagged commit must be an ancestor of
      # origin/main, or this job stops right here and builds nothing.
      # (The top repo is tiny; unshallowing it costs nothing. Submodules
      # stay shallow.)
      - name: Require the tagged commit to be on main
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git fetch --unshallow origin +refs/heads/main:refs/remotes/origin/main \
            || git fetch origin +refs/heads/main:refs/remotes/origin/main
          if git merge-base --is-ancestor "$GITHUB_SHA" refs/remotes/origin/main; then
            echo "tag $GITHUB_REF_NAME points at a commit on main — building"
          else
            echo "tag $GITHUB_REF_NAME is NOT on main — side-branch tags build nothing"
            exit 1
          fi

      # Resolve the pinned submodule SHAs into cache-key material. Each Circle
      # world is owned by its consumer as a NESTED submodule, one per threading
      # model, so those two pins capture the whole deps identity:
      #   - circle-libsdl2  owns the MULTICORE circle-stdlib (shim + payload)
      #   - rapi-bootloader owns the SINGLE-CORE circle-stdlib (boot picker)
      # Moving either repo's nested circle-stdlib moves that repo's own SHA, so
      # there is nothing else to key on.
      - name: Resolve cache keys
        id: keys
        run: |
          echo "sdl2=$(git -C circle-libsdl2 rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "bootloader=$(git -C rapi-bootloader rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          # The deps recipe is part of the identity.
          echo "deps=$(grep -A9 '^deps:' Makefile | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      # Cache the extracted toolchain, keyed on the release name. A hit
      # skips the ~96MB download + extract.
      - name: Cache Arm toolchain
        id: cache-toolchain
        uses: actions/cache@v4
        with:
          path: toolchain
          key: ${{ env.ARM_RELEASE }}

      - name: Fetch Arm toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p toolchain
          wget -q -O arm.tar.xz "$ARM_URL"
          tar -xf arm.tar.xz -C toolchain --strip-components=1
          rm -f arm.tar.xz

      - name: Put toolchain on PATH
        run: echo "$GITHUB_WORKSPACE/toolchain/bin" >> "$GITHUB_PATH"

      # The README's prerequisites for a clean host: make + wget, plus the
      # host compiler (build-essential — genie and newlib's build tools are
      # host-native) and python3 (MAME's build scripts). MAKEINFO=true in
      # the Makefile means texinfo is NOT needed.
      - name: Install prerequisites
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential make wget python3 zip unzip

      # Cache both built Circle worlds. Each lives INSIDE its owner now, so
      # caching the two owners covers everything: circle-libsdl2 carries the
      # multicore circle-stdlib (newlib + libc++) plus the shim archive, and
      # rapi-bootloader carries the single-core world the picker links. A hit
      # skips the ~40min newlib build. Key is the deps recipe + the two pins.
      - name: Cache deps (both Circle worlds + SDL2 shim)
        id: cache-deps
        uses: actions/cache@v4
        with:
          path: |
            circle-libsdl2
            rapi-bootloader
          key: deps-${{ steps.keys.outputs.deps }}-${{ steps.keys.outputs.sdl2 }}-${{ steps.keys.outputs.bootloader }}

      - name: Build deps
        run: make deps

      # mame-<board>/build is NOT cached: the tree is several GB and risks
      # evicting the far more valuable (and slower to rebuild) deps cache from
      # the 10GB repo budget. We eat the cold mamedrivers build instead. This is ONE
      # mamedrivers engine for the board (SOURCES-invariant engine + 3rdparty + the
      # superset device closure of every platform), built once; each platform
      # kernel links it with its own drivlist. Size is measured below so the
      # cache trade can be revisited with data, not guesswork.
      - name: Build the mamedrivers engine (this board)
        run: make mame RAPI_BOARD=${{ matrix.board }}

      # TRUTH GATE #1: build-mame.sh tees through `tail` and genie's final
      # host-style link ALWAYS fails by design (it links for the build host;
      # our kernel links the archives itself). So the shell pipe can exit
      # non-fatally on a real failure too. Here we check the real success
      # criteria for the board's ONE mamedrivers tree: the two SOURCES-invariant
      # objects host/Makefile links (mame.o, version.o), the OSD archive, and
      # the mamedrivers driver archives. Absent => a genuine compile failure slipped
      # through; fail RED right here.
      - name: Verify the mamedrivers engine (the final host-link fails by design)
        run: make verify-mame RAPI_BOARD=${{ matrix.board }}

      # This board's payload: every platform binary (kernel8-<platform>.img),
      # each linking the board's shared mamedrivers engine. Per-machine images
      # are NOT built here: at roster scale (195 machines x ~84MB x 3 boards)
      # the full set neither fits the runner's disk nor belongs in release
      # assets — a machine image is a local byte-patch of its platform binary
      # (`make kernel MACHINE=<m>`), and the patch path is proven by the
      # `make sd` smoke test below.
      - name: Build kernels (this board)
        run: make platform RAPI_BOARD=${{ matrix.board }}

      # The platform card's front door, built for THIS board (the bootloader
      # owns the per-board build under menu-loader/build/<board>/).
      - name: Build boot picker (this board)
        run: make picker RAPI_BOARD=${{ matrix.board }}

      # TRUTH GATE #2 (belt and braces): make platform is the real gate — if it
      # fails the job is already red. Additionally assert everything a release
      # ships exists and fits the 256MB ceiling: every platform binary
      # (kernel8-<platform>.img, the no-options kernels) and the board's picker
      # at its real path (rapi-bootloader/menu-loader/, not host/).
      - name: Verify kernel images (release scope)
        run: make verify-kernels RAPI_BOARD=${{ matrix.board }} VERIFY_SCOPE=platform

      # This board's card zips, one per (platform, tier): the picker as the
      # card's front door, the platform binary as the generic kernel-<board>.img
      # core, a generated bootmenu.cfg, and exactly the assets that menu needs
      # (mkcard derives the set from the menu — never the whole bundle). A tier
      # whose menu is empty (e.g. commodore-free — every commodore romset is
      # public) ships no card. The grey public-tier ROMs are not in the repo;
      # fetch-assets.sh pulls them from their mirrors here, at build time.
      - name: Assemble this board's card zips
        run: make dist TAG="${GITHUB_REF_NAME}" BOARDS=${{ matrix.board }}

      # Every run: this board's platform binaries as individual artifacts
      # (~85MB each) from the board-scoped build tree. Not zipped into one
      # blob — a user wants the one image for their platform. The artifact is
      # board-named so all three boards' uploads coexist in the run. Uploaded
      # BEFORE the smoke test below patches a per-machine image into the same
      # directory, so the glob stays platform-binaries-only.
      - name: Upload platform kernel images
        uses: actions/upload-artifact@v4
        with:
          name: kernel-images-${{ matrix.board }}
          path: host/build/${{ matrix.board }}/kernel8-*.img
          if-no-files-found: error

      # Smoke-test the single-machine card path (make kernel -> byte-patch,
      # make sd -> scripts/mksd.sh), which the platform-card path never
      # exercises — exactly where the stale boot-firmware path bug hid. This
      # also keeps the per-machine patch path CI-proven now that the full
      # machine set is no longer built.
      - name: Smoke-test make kernel + make sd (single-machine card)
        run: |
          make kernel MACHINE=spectrum RAPI_BOARD=${{ matrix.board }}
          make sd MACHINE=spectrum RAPI_BOARD=${{ matrix.board }} ASSETS=./all-assets

      # The cards are the actual deliverable — a bare kernel is not something
      # you can put in a Pi. A `ci` branch build exists to hand you the thing
      # you are about to release so it can be bench-tested BEFORE a tag is cut,
      # so the zips must come out of a branch build too.
      - name: Upload card zips
        uses: actions/upload-artifact@v4
        with:
          name: card-zips-${{ matrix.board }}
          path: dist/pi-mame-*.zip
          if-no-files-found: error

  # Cut ONE GitHub Release carrying every board's platform binaries and card
  # zips, gathered from the three build jobs, so users can skip the toolchain
  # entirely. A separate job because the deliverable is the board MATRIX —
  # release assets must wait for all three boards to go green. The body is
  # deliberately honest about what CI does and does not prove.
  # download-artifact/upload-artifact are first-party; the release action is
  # the workflow's one standing third-party exception.
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Gather all board artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/kernel-images-*/kernel8-*.img
            artifacts/card-zips-*/pi-mame-*.zip
          fail_on_unmatched_files: true
          generate_release_notes: false
          body: |
            Built by CI on clean Ubuntu runners from tag `${{ github.ref_name }}`,
            one full build per board (Pi 3, Pi 4, Pi 5).

            These images are **compile-proven**: they built from the published
            sources with no local toolchain. They have **not** been boot-proofed
            here — hardware boot-proofs happen on the project bench, not in CI.
            What has actually run on hardware lives in the per-platform tables
            under [docs/](https://github.com/Xalior/pi-mame/tree/${{ github.ref_name }}/docs).

            The `pi-mame-<tag>-<platform>-<free|public>-<board>.zip` assets are
            single-board platform cards: that board's firmware, the boot picker
            as the front door, the platform binary as the `kernel-<board>.img`
            core, a menu of that platform's machines, and the ROMs that menu
            needs. Extract one onto a blank FAT32 card and boot. The **free**
            card lists only machines whose every asset is freely-blessed and
            bundles just those ROMs. The **public** card lists the full roster —
            its grey "public-tier" ROMs (`scripts/assets.manifest`) are not in
            the repo; they are fetched from their mirrors at build time into the
            public zip alone. A menu entry whose ROMs could not be fetched still
            boots the picker; add the missing files to its card to run it.

            Each `kernel8-<platform>.img` is that platform's no-options kernel:
            dropped onto a prepared card as `kernel-<board>.img` it brings up
            MAME's own system-selection list. A single-machine image is a local
            one-liner from the published sources — `make kernel MACHINE=<m>` —
            a byte-patch of the platform binary (see docs/defaults-abi.md).
